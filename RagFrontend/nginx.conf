server {
    listen 80;
    server_name _;

    # 前端静态文件根目录
    root /usr/share/nginx/html;
    index index.html;

    # ── 全局超时配置（长文件上传/SSE 流）──────────────────────────
    # 与后端 uvicorn timeout 对齐，彻底消除上传中途的 504 断连
    client_max_body_size     100m;       # 允许上传最大 100MB（后端再做 50MB 校验）
    client_body_timeout      600s;       # 接收请求体超时 600s
    client_header_timeout    60s;
    send_timeout             600s;

    # 开启 gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # 健康检查端点
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── 文件上传专用 location（分块上传 + 合并接口）──────────────
    # 单独配置超长超时，避免影响普通 API 响应时间统计
    location ~ ^/api/(upload-chunk|upload-complete)/ {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        # 上传不做缓冲，直接透传到后端（避免 nginx 把整个文件缓存在内存后才发后端）
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
        proxy_connect_timeout   15s;
        # keepalive 复用上游连接，减少 TCP 握手开销
        proxy_set_header       Connection "";
    }

    # ── 后端 API 反代（普通接口）──────────────────────────────────
    location /api/ {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Connection "";
        # SSE 流式响应关闭缓冲
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     600s;
        proxy_connect_timeout  15s;
        # 透传 TraceID 请求头，保证前后端全链路可追溯
        proxy_set_header       X-Trace-Id $http_x_trace_id;
    }

    # 静态资源缓存（带 hash 的 chunk 文件长期缓存）
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Vue Router history 模式：所有非 /api 路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
